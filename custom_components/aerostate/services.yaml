run_self_test:
  name: Run AeroState self-test
  description: Run a safe IR self-test sequence against a configured AeroState entry.
  fields:
    entry_id:
      name: Config entry ID
      description: Target AeroState config entry ID.
      example: 01HXYZABCDEF1234567890
      selector:
        text:
    entity_id:
      name: Climate entity
      description: Target AeroState climate entity.
      selector:
        entity:
          domain: climate
    profile:
      name: Test profile
      description: basic runs safe pack-driven states; full attempts one additional supported state.
      default: basic
      selector:
        select:
          options:
            - basic
            - full

learn_ir_command:
  name: Learn IR Command
  description: >
    Put the Tuya IR blaster into learning mode for one AC state command.
    Point your physical LG remote at the blaster and press the button.
    The learned code is saved permanently and used for all future sends.
  fields:
    entity_id:
      name: Climate Entity
      description: The AeroState climate entity to learn for.
      required: true
      selector:
        entity:
          domain: climate
          integration: aerostate
    hvac_mode:
      name: HVAC Mode
      description: "Mode to learn: cool, heat, dry, fan_only, auto, or off"
      required: true
      example: cool
      selector:
        select:
          options: [cool, heat, dry, fan_only, auto, off]
    temperature:
      name: Temperature
      description: Target temperature (16-30). Leave empty for fan_only and off.
      required: false
      selector:
        number:
          min: 16
          max: 30
          mode: box
    fan_mode:
      name: Fan Mode
      description: "Fan speed: f1, f2, f3, f4, f5, or auto"
      required: false
      example: auto
      selector:
        select:
          options: [f1, f2, f3, f4, f5, auto]
    swing_on:
      name: Swing On
      description: Whether swing is enabled for this command.
      required: false
      default: false
      selector:
        boolean:
