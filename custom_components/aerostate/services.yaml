run_self_test:
  name: Run AeroState self-test
  description: Run a safe IR self-test sequence against a configured AeroState entry.
  fields:
    entry_id:
      name: Config entry ID
      description: Target AeroState config entry ID.
      example: 01HXYZABCDEF1234567890
      selector:
        text:
    entity_id:
      name: Climate entity
      description: Target AeroState climate entity.
      selector:
        entity:
          domain: climate
    profile:
      name: Test profile
      description: basic runs safe pack-driven states; full attempts one additional supported state.
      default: basic
      selector:
        select:
          options:
            - basic
            - full

learn_ir_command:
  name: Learn IR command
  description: Learn a new IR command into localtuya_rc storage for a Tuya AeroState entry.
  fields:
    entry_id:
      name: Config entry ID
      description: AeroState config entry ID (required for Tuya entries)
      required: true
      selector:
        text:
    command_name:
      name: Command name
      description: "Name to store the learned code under (e.g. 'heat_24_f3')"
      required: true
      selector:
        text:
    device_name:
      name: Device name
      description: "localtuya_rc device name (default: Living AC IR)"
      required: false
      default: Living AC IR
      selector:
        text:
