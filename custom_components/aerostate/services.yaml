run_self_test:
  name: Run AeroState self-test
  description: Run a safe IR self-test sequence against a configured AeroState entry.
  fields:
    entry_id:
      name: Config entry ID
      description: Target AeroState config entry ID.
      example: 01HXYZABCDEF1234567890
      selector:
        text:
    entity_id:
      name: Climate entity
      description: Target AeroState climate entity.
      selector:
        entity:
          domain: climate
    profile:
      name: Test profile
      description: basic runs safe pack-driven states; full attempts one additional supported state.
      default: basic
      selector:
        select:
          options:
            - basic
            - full

learn_ir_command:
  name: Learn IR command
  description: Learn a new IR command into localtuya_rc storage for a Tuya AeroState entry.
  fields:
    entry_id:
      name: Config entry ID
      description: AeroState config entry ID (required for Tuya entries)
      required: true
      selector:
        text:
    command_name:
      name: Command name
      description: "Name to store the learned code under (e.g. 'heat_24_f3')"
      required: true
      selector:
        text:
    device_name:
      name: Device name
      description: "localtuya_rc device name (default: Living AC IR)"
      required: false
      default: Living AC IR
      selector:
        text:

export_tuya_raw_codes:
  name: Export Tuya raw codes
  description: Export learned Tuya IR raw codes into AeroState's portable code library for use on another Home Assistant or Tuya IR blaster.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional AeroState Tuya config entry ID to use for the default device name.
      required: false
      selector:
        text:
    device_name:
      name: Device name
      description: localtuya_rc device name or AeroState portable pack device name.
      required: false
      default: Living AC IR
      selector:
        text:
    pack_id:
      name: Pack ID
      description: Portable pack filename/id, for example lg_pc09sq_nsj_v1.
      required: false
      default: lg_pc09sq_nsj_v1
      selector:
        text:
    title:
      name: Title
      description: Human-readable title for the exported code pack.
      required: false
      selector:
        text:
    destination:
      name: Destination
      description: user_library writes to /config/aerostate_tuya_raw_codes; integration_bundle writes inside the AeroState integration for shipping with the custom component.
      required: false
      default: user_library
      selector:
        select:
          options:
            - user_library
            - integration_bundle
