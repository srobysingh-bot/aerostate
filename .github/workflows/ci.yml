name: CI

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff homeassistant

      - name: Ruff
        run: ruff check .

      - name: Pytest
        env:
          PYTHONPATH: .
        run: pytest -q

      - name: Hassfest
        run: python -m script.hassfest
